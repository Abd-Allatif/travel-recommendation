<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Recommendation</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <!-- Navigation Bar -->
    <div id="navBar">
      <div id="titleLogoDiv">
        <i class="fa fa-plane" id="planIcon"></i>
        <h1>Travel Recommendation</h1>
      </div>
      <nav>
        <ul id="navLinks">
          <li><a class="links" href="travel_recommendation.html">Home</a></li>
          <li><a class="links" href="aboutUs.html">About Us</a></li>
          <li><a class="links" href="contactUs.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
    <!-- Main Screen -->
    <div id="mainScreen">
      <img src="assets/Background.jpg" alt="BackgroundImage" id="backgroundImg"/>
      <div id="mainScreenItemsDiv">
        <div id="mainScreenSocial">
          <i class="fa fa-twitter" id="social"></i>
          <i class="fa fa-facebook" id="social"></i>
          <i class="fa fa-instagram" id="social"></i>
          <i class="fa fa-youtube-play" id="social"></i>
        </div>
        <div id="contactUsTextDiv">
          <div id="contactTitle">
            <h1 id="homeText">CONTACT US</h1>
            <p style="color: white; font-family: Arial, Helvetica, sans-serif">
              Get in touch
            </p>
          </div>
          <div id="contactForm">
            <label for="Name">Name</label>
            <input type="text" name="Name" placeholder="Enter Your Name" class="contactForm">
            <Label for="Email">Email</Label>
            <input type="email" name="Email" placeholder="Enter your Email" class="contactForm">
            <label for="message">Message</label>
            <textarea name="message" name="message" placeholder="Enter Your Message" class="messageForm"></textarea>
            <button id="submitButton">Submit</button>
          </div>
        </div>
      </div>
    </div>
    <script src="travel_recommendation.js"></script>
  </body>
</html>
